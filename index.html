<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVE PI Planner — Мульти-файловая загрузка</title>
    <style>
        :root {
            --bg: #0f1923;
            --surface: #1a2a3a;
            --text: #cdd6e0;
            --accent: #47a9b0;
            --border: #2a3f4f;
            --abundance-veryhigh: #ff4444;
            --abundance-high: #ff8c00;
            --abundance-medium: #ffd700;
            --abundance-low: #7ec850;
            --abundance-verylow: #4a9bd4;
            --abundance-none: #6c7a89;
        }
        body {
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: var(--accent);
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
        }

        .global-filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            background: var(--surface);
            padding: 12px 15px;
            border-radius: 8px;
            align-items: center;
        }
        .global-filters label {
            margin-right: 5px;
            white-space: nowrap;
        }
        .global-filters select {
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }

        .legend {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
            background: var(--surface);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85em;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .legend-color {
            width: 18px;
            height: 18px;
            border-radius: 3px;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .progress-container {
            margin-bottom: 15px;
            background: var(--surface);
            padding: 10px 15px;
            border-radius: 8px;
            display: none;
        }
        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.8em;
            color: #7f8c8d;
            margin-top: 3px;
        }

        .table-wrapper {
            overflow-x: auto;
            background: var(--surface);
            border-radius: 8px;
            padding: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        th {
            background: #2a3f4f;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        th input {
            width: 90%;
            padding: 6px 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #1e3a4a;
            background: #0d1a24;
            color: var(--text);
            font-size: 0.9em;
        }
        th input::placeholder {
            color: #6c7a89;
        }
        td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            transition: background 0.2s;
        }
        tr:hover td {
            filter: brightness(1.15);
        }

        .abundance-veryhigh {
            background-color: var(--abundance-veryhigh);
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 6px rgba(255,255,255,0.5);
        }
        .abundance-high {
            background-color: var(--abundance-high);
            color: #fff;
            font-weight: bold;
        }
        .abundance-medium {
            background-color: var(--abundance-medium);
            color: #1a1a1a;
            font-weight: bold;
        }
        .abundance-low {
            background-color: var(--abundance-low);
            color: #1a1a1a;
            font-weight: bold;
        }
        .abundance-verylow {
            background-color: var(--abundance-verylow);
            color: #fff;
            font-weight: bold;
        }
        .abundance-none {
            background-color: var(--abundance-none);
            color: #fff;
        }

        tr.abundance-row-veryhigh td:not(:last-child) { background-color: rgba(255, 68, 68, 0.08); }
        tr.abundance-row-high td:not(:last-child) { background-color: rgba(255, 140, 0, 0.08); }
        tr.abundance-row-medium td:not(:last-child) { background-color: rgba(255, 215, 0, 0.08); }
        tr.abundance-row-low td:not(:last-child) { background-color: rgba(126, 200, 80, 0.08); }
        tr.abundance-row-verylow td:not(:last-child) { background-color: rgba(74, 155, 212, 0.08); }

        .stats {
            margin: 10px 0 5px;
            font-size: 0.9em;
            color: #7f8c8d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .data-source {
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.85em;
            padding: 6px;
            border-radius: 5px;
            background: #1a3a1a;
            color: #7ec850;
        }

        .data-source.error {
            background: #3a1a1a;
            color: #ff4444;
        }

        th.sorted-asc::after {
            content: ' ▲';
            font-size: 0.7em;
        }
        th.sorted-desc::after {
            content: ' ▼';
            font-size: 0.7em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Планетарное производство: мгновенный поиск</h1>

        <div class="data-source" id="dataSource">⏳ Загрузка данных...</div>

        <!-- Индикатор прогресса загрузки файлов -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-text" id="progressText">Загрузка файлов...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="global-filters">
            <label>🎯 Ресурс:</label>
            <select id="resourceSelect">
                <option value="">Все ресурсы</option>
            </select>
            <label>🌌 Регион:</label>
            <select id="regionSelect">
                <option value="">Все регионы</option>
            </select>
            <label>✨ Созвездие:</label>
            <select id="constellationSelect">
                <option value="">Все созвездия</option>
            </select>
        </div>

        <div class="legend">
            <span style="color:#7f8c8d;">Abundance:</span>
            <div class="legend-item"><span class="legend-color" style="background:var(--abundance-veryhigh);"></span> 2.0+</div>
            <div class="legend-item"><span class="legend-color" style="background:var(--abundance-high);"></span> 1.5–2.0</div>
            <div class="legend-item"><span class="legend-color" style="background:var(--abundance-medium);"></span> 1.0–1.5</div>
            <div class="legend-item"><span class="legend-color" style="background:var(--abundance-low);"></span> 0.5–1.0</div>
            <div class="legend-item"><span class="legend-color" style="background:var(--abundance-verylow);"></span> 0.01–0.5</div>
            <div class="legend-item"><span class="legend-color" style="background:var(--abundance-none);"></span> 0</div>
        </div>

        <div class="stats" id="stats">Загрузка данных...</div>

        <div class="table-wrapper">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Регион <br><input type="text" id="filterRegion" placeholder="Фильтр..."></th>
                        <th>Созвездие <br><input type="text" id="filterConstellation" placeholder="Фильтр..."></th>
                        <th>Система <br><input type="text" id="filterSystem" placeholder="Фильтр..."></th>
                        <th>Планета <br><input type="text" id="filterPlanet" placeholder="Фильтр..."></th>
                        <th>Ресурс <br><input type="text" id="filterResource" placeholder="Фильтр..."></th>
                        <th>Тип (Output) <br><input type="text" id="filterOutput" placeholder="Фильтр..."></th>
                        <th>Abundance <br><input type="number" id="filterAbundanceMin" placeholder="Мин." style="width:60px;" step="0.1"></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        // ==========================================================================
        // СПИСОК ВСЕХ ЧАСТЕЙ ДАННЫХ:
        // Укажите здесь имена ваших файлов (относительно index.html)
        // Поддерживаются JSON и CSV файлы
        // ==========================================================================
        const DATA_FILES = [
            'data_part1.json',
            'data_part2.json',
            'data_part3.json'
            // Добавьте ещё файлы, если нужно, например:
            // 'data_part4.json',
            // 'data_part5.json',
            // 'data.csv'  // можно и CSV
        ];

        // URL Google Таблицы (запасной вариант)
        const GOOGLE_CSV_URL = 'https://docs.google.com/spreadsheets/d/1scYj1wvdz661kVNSD7LZUqBwVLjhpQL8fb5IH3_-mrs/export?format=csv';

        let allData = [];
        let resourceSet = new Set();
        let regionSet = new Set();
        let constellationSet = new Set();

        // Индикаторы
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const dataSourceInfo = document.getElementById('dataSource');

        function getAbundanceCategory(value) {
            if (value >= 2.0) return 'veryhigh';
            if (value >= 1.5) return 'high';
            if (value >= 1.0) return 'medium';
            if (value >= 0.5) return 'low';
            if (value > 0) return 'verylow';
            return 'none';
        }

        function updateProgress(current, total, fileName) {
            const percent = Math.round((current / total) * 100);
            progressFill.style.width = percent + '%';
            progressText.textContent = `Загрузка файла ${current} из ${total}: ${fileName}`;
        }

        // Определяем тип файла по расширению и загружаем
        async function loadFile(fileName) {
            const response = await fetch(fileName);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const text = await response.text();
            
            // Определяем формат: JSON или CSV
            if (fileName.toLowerCase().endsWith('.json')) {
                try {
                    return JSON.parse(text);
                } catch (e) {
                    throw new Error(`Ошибка парсинга JSON в файле ${fileName}: ${e.message}`);
                }
            } else {
                // Считаем, что это CSV
                return parseCSVToJSON(text);
            }
        }

        function parseCSVToJSON(csv) {
            const lines = csv.split('\n').filter(line => line.trim() !== '');
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim().replace(/^"(.*)"$/, '$1'));
            const idx = {
                region: headers.findIndex(h => h.toLowerCase() === 'region'),
                constellation: headers.findIndex(h => h.toLowerCase() === 'constellation'),
                system: headers.findIndex(h => h.toLowerCase() === 'system'),
                planet: headers.findIndex(h => h.toLowerCase() === 'planet'),
                resource: headers.findIndex(h => h.toLowerCase() === 'resource'),
                output: headers.findIndex(h => h.toLowerCase() === 'output'),
                abundance: headers.findIndex(h => h.toLowerCase() === 'abundance')
            };

            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',').map(c => c.trim().replace(/^"(.*)"$/, '$1'));
                if (cols.length < headers.length) continue;
                result.push({
                    region: cols[idx.region] || '',
                    constellation: cols[idx.constellation] || '',
                    system: cols[idx.system] || '',
                    planet: cols[idx.planet] || '',
                    resource: cols[idx.resource] || '',
                    output: cols[idx.output] || '',
                    abundance: parseFloat(cols[idx.abundance]) || 0
                });
            }
            return result;
        }

        // Загрузка всех файлов частями
        async function loadAllParts() {
            progressContainer.style.display = 'block';
            allData = [];
            resourceSet.clear();
            regionSet.clear();
            constellationSet.clear();

            const totalFiles = DATA_FILES.length;
            let loadedCount = 0;
            let totalRecords = 0;

            for (let i = 0; i < totalFiles; i++) {
                const fileName = DATA_FILES[i];
                updateProgress(i + 1, totalFiles, fileName);

                try {
                    const fileData = await loadFile(fileName);
                    if (Array.isArray(fileData)) {
                        // Обрабатываем каждую запись
                        fileData.forEach(item => {
                            const abundance = parseFloat(item.abundance) || 0;
                            const region = item.region || '';
                            const constellation = item.constellation || '';
                            const system = item.system || '';
                            const planet = item.planet || '';
                            const resource = item.resource || '';
                            const output = item.output || '';

                            if (!region || !system || !resource) return;

                            allData.push({
                                region,
                                constellation,
                                system,
                                planet,
                                resource,
                                output,
                                abundance,
                                category: getAbundanceCategory(abundance)
                            });

                            resourceSet.add(resource);
                            regionSet.add(region);
                            if (constellation) constellationSet.add(constellation);
                        });
                        loadedCount++;
                        totalRecords += fileData.length;
                    } else {
                        console.warn(`Файл ${fileName} не содержит массив данных`);
                    }
                } catch (err) {
                    console.error(`Ошибка загрузки ${fileName}:`, err);
                    // Продолжаем со следующим файлом
                }
            }

            progressContainer.style.display = 'none';
            return { loadedCount, totalRecords };
        }

        // Запасной вариант: загрузка из Google Таблицы
        async function loadFromGoogle() {
            try {
                const response = await fetch(GOOGLE_CSV_URL);
                if (!response.ok) throw new Error('Google Таблица недоступна');
                const csvText = await response.text();
                const jsonData = parseCSVToJSON(csvText);
                
                jsonData.forEach(item => {
                    const abundance = parseFloat(item.abundance) || 0;
                    allData.push({
                        ...item,
                        abundance,
                        category: getAbundanceCategory(abundance)
                    });
                    resourceSet.add(item.resource);
                    regionSet.add(item.region);
                    if (item.constellation) constellationSet.add(item.constellation);
                });
                
                return jsonData.length;
            } catch (err) {
                console.error('Ошибка загрузки из Google:', err);
                return 0;
            }
        }

        function populateSelects() {
            const fill = (selectId, collection) => {
                const select = document.getElementById(selectId);
                select.innerHTML = '<option value="">Все</option>';
                [...collection].sort().forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item;
                    opt.textContent = item;
                    select.appendChild(opt);
                });
            };
            fill('resourceSelect', resourceSet);
            fill('regionSelect', regionSet);
            fill('constellationSelect', constellationSet);
        }

        function applyAllFilters() {
            const resourceGlobal = document.getElementById('resourceSelect').value;
            const regionGlobal = document.getElementById('regionSelect').value;
            const constellationGlobal = document.getElementById('constellationSelect').value;

            const filterText = {
                region: document.getElementById('filterRegion').value.toLowerCase(),
                constellation: document.getElementById('filterConstellation').value.toLowerCase(),
                system: document.getElementById('filterSystem').value.toLowerCase(),
                planet: document.getElementById('filterPlanet').value.toLowerCase(),
                resource: document.getElementById('filterResource').value.toLowerCase(),
                output: document.getElementById('filterOutput').value.toLowerCase()
            };
            const minAbundance = parseFloat(document.getElementById('filterAbundanceMin').value) || 0;

            let filtered = allData.filter(row => {
                if (resourceGlobal && row.resource !== resourceGlobal) return false;
                if (regionGlobal && row.region !== regionGlobal) return false;
                if (constellationGlobal && row.constellation !== constellationGlobal) return false;

                if (filterText.region && !row.region.toLowerCase().includes(filterText.region)) return false;
                if (filterText.constellation && !row.constellation.toLowerCase().includes(filterText.constellation)) return false;
                if (filterText.system && !row.system.toLowerCase().includes(filterText.system)) return false;
                if (filterText.planet && !row.planet.toLowerCase().includes(filterText.planet)) return false;
                if (filterText.resource && !row.resource.toLowerCase().includes(filterText.resource)) return false;
                if (filterText.output && !row.output.toLowerCase().includes(filterText.output)) return false;
                if (row.abundance < minAbundance) return false;

                return true;
            });

            filtered.sort((a, b) => b.abundance - a.abundance);
            renderTable(filtered);
        }

        function renderTable(data) {
            const tbody = document.querySelector('#resultsTable tbody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;">Нет данных, соответствующих фильтрам</td></tr>';
            } else {
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.classList.add(`abundance-row-${row.category}`);
                    tr.innerHTML = `
                        <td>${row.region}</td>
                        <td>${row.constellation}</td>
                        <td>${row.system}</td>
                        <td>${row.planet}</td>
                        <td>${row.resource}</td>
                        <td>${row.output}</td>
                        <td><span class="abundance-${row.category}">${row.abundance.toFixed(2)}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            document.getElementById('stats').textContent = `Показано записей: ${data.length} из ${allData.length}`;
        }

        function initSorting() {
            const table = document.getElementById('resultsTable');
            const headers = table.querySelectorAll('th');
            const columnKeyMap = {
                'Регион': 'region',
                'Созвездие': 'constellation',
                'Система': 'system',
                'Планета': 'planet',
                'Ресурс': 'resource',
                'Тип (Output)': 'output',
                'Abundance': 'abundance'
            };

            headers.forEach(th => {
                const headerText = th.childNodes[0]?.nodeValue?.trim() || '';
                const key = columnKeyMap[headerText];
                if (!key) return;

                th.addEventListener('click', () => {
                    const tbody = table.querySelector('tbody');
                    const rows = Array.from(tbody.querySelectorAll('tr'));
                    if (rows.length === 0 || rows[0].querySelector('td[colspan]')) return;

                    headers.forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));

                    const isAsc = !th.classList.contains('sorted-asc');
                    th.classList.add(isAsc ? 'sorted-asc' : 'sorted-desc');

                    const factor = isAsc ? 1 : -1;
                    const dataIndex = Array.from(th.parentNode.children).indexOf(th);

                    rows.sort((a, b) => {
                        let aVal = a.children[dataIndex]?.textContent.trim() || '';
                        let bVal = b.children[dataIndex]?.textContent.trim() || '';
                        if (key === 'abundance') {
                            return (parseFloat(aVal) - parseFloat(bVal)) * factor;
                        } else {
                            return aVal.localeCompare(bVal) * factor;
                        }
                    });
                    rows.forEach(row => tbody.appendChild(row));
                });
            });
        }

        function bindEvents() {
            ['resourceSelect', 'regionSelect', 'constellationSelect'].forEach(id => {
                document.getElementById(id).addEventListener('change', applyAllFilters);
            });

            ['filterRegion', 'filterConstellation', 'filterSystem', 'filterPlanet', 'filterResource', 'filterOutput', 'filterAbundanceMin'].forEach(id => {
                document.getElementById(id).addEventListener('input', applyAllFilters);
            });
        }

        async function init() {
            // Пробуем загрузить локальные файлы
            const { loadedCount, totalRecords } = await loadAllParts();

            if (loadedCount > 0 && allData.length > 0) {
                dataSourceInfo.textContent = `✅ Загружено ${loadedCount} файлов — ${allData.length} записей`;
                dataSourceInfo.className = 'data-source';
            } else {
                // Запасной вариант: Google Таблица
                dataSourceInfo.textContent = '⚠️ Локальные файлы не найдены, пробую Google Таблицу...';
                dataSourceInfo.className = 'data-source';
                
                const googleRecords = await loadFromGoogle();
                if (googleRecords > 0) {
                    dataSourceInfo.textContent = `✅ Загружено из Google Таблицы — ${allData.length} записей`;
                } else {
                    dataSourceInfo.textContent = '❌ Не удалось загрузить данные ни из одного источника';
                    dataSourceInfo.className = 'data-source error';
                }
            }

            if (allData.length > 0) {
                populateSelects();
                applyAllFilters();
            } else {
                document.getElementById('stats').textContent = 'Нет данных';
            }
        }

        init();
        bindEvents();
        setTimeout(initSorting, 200);
    </script>
</body>
</html>
