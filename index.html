<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVE PI Planner — Лучшая добыча</title>
    <style>
        :root {
            --bg: #0f1923;
            --surface: #1a2a3a;
            --text: #cdd6e0;
            --accent: #47a9b0;
            --border: #2a3f4f;
            --gold: #d4af37;
            --danger: #ff4444;
        }
        
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: var(--accent);
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            letter-spacing: 1px;
        }
        
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        /* Панель управления */
        .controls {
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 200px;
        }
        
        .control-group label {
            font-size: 0.8em;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .control-group select {
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.95em;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        
        .control-group select:hover {
            border-color: var(--accent);
        }
        
        .control-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(71, 169, 176, 0.1);
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
            white-space: nowrap;
            height: 40px;
        }
        
        .btn:hover {
            background: var(--accent);
            color: var(--bg);
        }
        
        .btn.active {
            background: var(--accent);
            color: var(--bg);
        }

        /* Статистика */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px 16px;
            background: var(--surface);
            border-radius: 8px;
            font-size: 0.9em;
        }
        
        .stats-bar .record-count {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .stats-bar .view-mode {
            color: var(--gold);
            font-weight: 600;
        }

        /* Таблица */
        .table-wrapper {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #1e3040;
            padding: 14px 16px;
            text-align: left;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
            cursor: pointer;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
            transition: background 0.2s;
        }
        
        th:hover {
            background: #243850;
        }
        
        th.sorted-asc::after {
            content: ' ▲';
            color: var(--accent);
        }
        
        th.sorted-desc::after {
            content: ' ▼';
            color: var(--accent);
        }
        
        td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(42, 63, 79, 0.5);
            font-size: 0.95em;
        }
        
        tr:hover td {
            background: rgba(71, 169, 176, 0.05);
        }
        
        /* Подсветка лучших значений */
        .best-resource {
            color: var(--gold);
            font-weight: 600;
        }
        
        .planet-name {
            color: #e0e0e0;
            font-weight: 500;
        }
        
        .system-name {
            color: var(--accent);
        }
        
        .region-name {
            color: #8ab4f8;
        }
        
        .output-value {
            font-family: 'Consolas', monospace;
            color: var(--gold);
            font-weight: 600;
            font-size: 1em;
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }
        
        .empty-state .icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }
            
            .control-group {
                min-width: 100%;
            }
            
            table {
                font-size: 0.85em;
            }
            
            th, td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Планетарное производство</h1>
        <p class="subtitle">Найдите лучшие планеты для добычи ресурсов в EVE Online</p>

        <!-- Панель управления -->
        <div class="controls">
            <div class="control-group">
                <label>🌌 Регион</label>
                <select id="regionSelect">
                    <option value="">Весь мир (лучшая добыча)</option>
                </select>
            </div>
            <div class="control-group">
                <label>🎯 Ресурс</label>
                <select id="resourceSelect">
                    <option value="">Все ресурсы</option>
                </select>
            </div>
            <div class="control-group" style="flex: 0.5; min-width: 120px;">
                <label>🔢 Топ</label>
                <select id="topLimit">
                    <option value="10">Топ-10</option>
                    <option value="25">Топ-25</option>
                    <option value="50">Топ-50</option>
                    <option value="100">Топ-100</option>
                </select>
            </div>
            <button class="btn" id="resetBtn">🔄 Сбросить</button>
        </div>

        <!-- Статистика -->
        <div class="stats-bar">
            <span class="record-count" id="recordCount">Загрузка...</span>
            <span class="view-mode" id="viewMode"></span>
        </div>

        <!-- Таблица -->
        <div class="table-wrapper">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Регион</th>
                        <th>Система</th>
                        <th>Планета</th>
                        <th>Ресурс</th>
                        <th>Добыча</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" class="empty-state"><span class="icon">⏳</span><br>Загрузка данных...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ==========================================================================
        // КОНФИГУРАЦИЯ
        // ==========================================================================
        const DATA_FILES = [
            'data_part1.json',
            'data_part2.json'
        ];

        const GOOGLE_CSV_URL = 'https://docs.google.com/spreadsheets/d/1scYj1wvdz661kVNSD7LZUqBwVLjhpQL8fb5IH3_-mrs/export?format=csv';

        // ==========================================================================
        // СОСТОЯНИЕ
        // ==========================================================================
        let allData = [];
        let resourceSet = new Set();
        let regionSet = new Set();
        let currentView = 'world'; // 'world' или 'region'

        // ==========================================================================
        // ЗАГРУЗКА ДАННЫХ
        // ==========================================================================
        function parseCSVToJSON(csv) {
            const lines = csv.split('\n').filter(line => line.trim() !== '');
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim().replace(/^"(.*)"$/, '$1'));
            const idx = {
                region: headers.findIndex(h => h.toLowerCase() === 'region'),
                constellation: headers.findIndex(h => h.toLowerCase() === 'constellation'),
                system: headers.findIndex(h => h.toLowerCase() === 'system'),
                planet: headers.findIndex(h => h.toLowerCase() === 'planet' || h.toLowerCase() === 'planet name'),
                resource: headers.findIndex(h => h.toLowerCase() === 'resource'),
                output: headers.findIndex(h => h.toLowerCase() === 'output'),
                abundance: headers.findIndex(h => h.toLowerCase() === 'abundance')
            };

            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',').map(c => c.trim().replace(/^"(.*)"$/, '$1'));
                if (cols.length < headers.length) continue;
                result.push({
                    region: cols[idx.region] || '',
                    constellation: cols[idx.constellation] || '',
                    system: cols[idx.system] || '',
                    planet: cols[idx.planet] || '',
                    resource: cols[idx.resource] || '',
                    output: cols[idx.output] || '',
                    abundance: parseFloat(cols[idx.abundance]) || 0
                });
            }
            return result;
        }

        async function loadFile(fileName) {
            const response = await fetch(fileName);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            
            if (fileName.toLowerCase().endsWith('.json')) {
                return JSON.parse(text);
            } else {
                return parseCSVToJSON(text);
            }
        }

        async function loadAllParts() {
    allData = [];
    resourceSet.clear();
    regionSet.clear();

    for (const fileName of DATA_FILES) {
        try {
            const fileData = await loadFile(fileName);
            if (Array.isArray(fileData) && fileData.length > 0) {
                // 🛠️ ДИАГНОСТИКА: смотрим структуру первого объекта
                console.log('📁 Файл:', fileName);
                console.log('🔑 Ключи первого объекта:', Object.keys(fileData[0]));
                console.log('📝 Пример первой записи:', JSON.stringify(fileData[0], null, 2));
                
                fileData.forEach((item, index) => {
                    // Пробуем найти значение добычи по разным возможным названиям
                    const abundance = parseFloat(
                        item.abundance || 
                        item.Abundance || 
                        item.value || 
                        item.Value || 
                        item.output_value || 
                        item.OutputValue ||
                        item.добыча ||
                        0
                    );
                    
                    const region = item.region || item.Region || '';
                    const system = item.system || item.System || '';
                    const planet = item.planet || item.Planet || item.planet_name || item.PlanetName || '';
                    const resource = item.resource || item.Resource || '';
                    const output = item.output || item.Output || '';

                    if (!region || !system || !resource) return;

                    // Выводим первые 3 записи для проверки
                    if (index < 3) {
                        console.log(`Запись #${index}: region="${region}", system="${system}", planet="${planet}", resource="${resource}", output="${output}", abundance=${abundance}`);
                    }

                    allData.push({
                        region,
                        constellation: item.constellation || item.Constellation || '',
                        system,
                        planet,
                        resource,
                        output,
                        abundance
                    });

                    resourceSet.add(resource);
                    regionSet.add(region);
                });
            }
        } catch (err) {
            console.error(`Ошибка загрузки ${fileName}:`, err);
        }
    }
    
    console.log(`✅ Загружено: ${allData.length} записей`);
    console.log(`📊 Пример финальной записи:`, allData[0]);
}

        async function loadFromGoogle() {
            try {
                const response = await fetch(GOOGLE_CSV_URL);
                if (!response.ok) throw new Error('Google Таблица недоступна');
                const csvText = await response.text();
                const jsonData = parseCSVToJSON(csvText);
                
                jsonData.forEach(item => {
                    const abundance = parseFloat(item.abundance) || 0;
                    allData.push({
                        ...item,
                        abundance
                    });
                    resourceSet.add(item.resource);
                    regionSet.add(item.region);
                });
            } catch (err) {
                console.error('Ошибка загрузки из Google:', err);
            }
        }

        // ==========================================================================
        // ЛОГИКА ПОИСКА ЛУЧШЕЙ ДОБЫЧИ
        // ==========================================================================
        
        // Группировка по Output, выбор лучшей планеты по Abundance
        function getBestByOutput(data) {
            const grouped = {};
            
            data.forEach(row => {
                const key = row.output || row.resource;
                if (!grouped[key] || row.abundance > grouped[key].abundance) {
                    grouped[key] = { ...row };
                }
            });
            
            return Object.values(grouped)
                .sort((a, b) => b.abundance - a.abundance);
        }

        // Топ-N по Abundance
        function getTopN(data, n) {
            return [...data]
                .sort((a, b) => b.abundance - a.abundance)
                .slice(0, n);
        }

        function applyView() {
            const regionFilter = document.getElementById('regionSelect').value;
            const resourceFilter = document.getElementById('resourceSelect').value;
            const topLimit = parseInt(document.getElementById('topLimit').value);

            let filtered = allData;

            // Фильтр по региону
            if (regionFilter) {
                filtered = filtered.filter(row => row.region === regionFilter);
                currentView = 'region';
            } else {
                currentView = 'world';
            }

            // Фильтр по ресурсу
            if (resourceFilter) {
                filtered = filtered.filter(row => row.resource === resourceFilter);
            }

            // Получаем лучшие по Output
            const bestByOutput = getBestByOutput(filtered);
            
            // Берём топ-N
            const topResults = bestByOutput.slice(0, topLimit);

            renderTable(topResults);
        }

        // ==========================================================================
        // ОТРИСОВКА
        // ==========================================================================
        function renderTable(data) {
            const tbody = document.querySelector('#resultsTable tbody');
            
            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-state">
                            <span class="icon">🔍</span><br>
                            Нет данных для отображения
                        </td>
                    </tr>`;
            } else {
                tbody.innerHTML = data.map((row, index) => `
                    <tr>
                        <td><span class="region-name">${row.region}</span></td>
                        <td><span class="system-name">${row.system}</span></td>
                        <td><span class="planet-name">${row.planet}</span></td>
                        <td>${row.resource} → <span class="best-resource">${row.output}</span></td>
                        <td><span class="output-value">${row.abundance.toFixed(2)}</span></td>
                    </tr>
                `).join('');
            }

            // Обновляем статистику
            const regionName = document.getElementById('regionSelect').value || 'Весь мир';
            const viewLabel = document.getElementById('regionSelect').value 
                ? `Лучшая добыча в регионе: ${regionName}`
                : 'Лучшая добыча во всём мире';
            
            document.getElementById('recordCount').textContent = 
                `Показано: ${data.length} типов ресурсов`;
            document.getElementById('viewMode').textContent = viewLabel;
        }

        // ==========================================================================
        // ЗАПОЛНЕНИЕ ФИЛЬТРОВ
        // ==========================================================================
        function populateSelects() {
            // Регионы
            const regionSelect = document.getElementById('regionSelect');
            regionSelect.innerHTML = '<option value="">Весь мир (лучшая добыча)</option>';
            [...regionSet].sort().forEach(region => {
                const opt = document.createElement('option');
                opt.value = region;
                opt.textContent = region;
                regionSelect.appendChild(opt);
            });

            // Ресурсы
            const resourceSelect = document.getElementById('resourceSelect');
            resourceSelect.innerHTML = '<option value="">Все ресурсы</option>';
            [...resourceSet].sort().forEach(resource => {
                const opt = document.createElement('option');
                opt.value = resource;
                opt.textContent = resource;
                resourceSelect.appendChild(opt);
            });
        }

        // ==========================================================================
        // СОРТИРОВКА ТАБЛИЦЫ
        // ==========================================================================
        function initSorting() {
            const table = document.getElementById('resultsTable');
            const headers = table.querySelectorAll('th');
            const columnMap = {
                'Регион': 'region',
                'Система': 'system',
                'Планета': 'planet',
                'Ресурс': 'output',
                'Добыча': 'abundance'
            };

            headers.forEach(th => {
                th.addEventListener('click', () => {
                    const headerText = th.textContent.trim();
                    const key = columnMap[headerText];
                    if (!key) return;

                    const tbody = table.querySelector('tbody');
                    const rows = Array.from(tbody.querySelectorAll('tr'));
                    if (rows.length === 0 || rows[0].querySelector('.empty-state')) return;

                    // Очищаем индикаторы
                    headers.forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));

                    // Определяем направление
                    const isAsc = !th.classList.contains('sorted-asc');
                    th.classList.add(isAsc ? 'sorted-asc' : 'sorted-desc');

                    const factor = isAsc ? 1 : -1;
                    const dataIndex = Array.from(th.parentNode.children).indexOf(th);

                    rows.sort((a, b) => {
                        let aVal = a.children[dataIndex]?.textContent.trim() || '';
                        let bVal = b.children[dataIndex]?.textContent.trim() || '';
                        
                        if (key === 'abundance') {
                            return (parseFloat(aVal) - parseFloat(bVal)) * factor;
                        } else {
                            return aVal.localeCompare(bVal) * factor;
                        }
                    });

                    rows.forEach(row => tbody.appendChild(row));
                });
            });
        }

        // ==========================================================================
        // СОБЫТИЯ
        // ==========================================================================
        function bindEvents() {
            document.getElementById('regionSelect').addEventListener('change', applyView);
            document.getElementById('resourceSelect').addEventListener('change', applyView);
            document.getElementById('topLimit').addEventListener('change', applyView);
            
            document.getElementById('resetBtn').addEventListener('click', () => {
                document.getElementById('regionSelect').value = '';
                document.getElementById('resourceSelect').value = '';
                document.getElementById('topLimit').value = '10';
                applyView();
            });
        }

        // ==========================================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ==========================================================================
        async function init() {
            // Пробуем локальные файлы
            await loadAllParts();

            // Если локальных нет — грузим из Google
            if (allData.length === 0) {
                await loadFromGoogle();
            }

            if (allData.length > 0) {
                populateSelects();
                applyView(); // По умолчанию: весь мир, топ-10
                document.getElementById('recordCount').textContent = 
                    `Всего записей: ${allData.length.toLocaleString()}`;
            } else {
                document.getElementById('recordCount').textContent = 
                    '❌ Данные не загружены';
            }
        }

        init();
        bindEvents();
        setTimeout(initSorting, 300);
    </script>
</body>
</html>
